api:
  gamma_base: "https://gamma-api.polymarket.com"
  clob_base: "https://clob.polymarket.com"
  request_timeout_seconds: 15

fetch:
  closed: true
  limit: 200
  offset: 0
  max_markets: 100
  include_price_history: true
  history_interval: "max"
  history_fidelity: 60

strategy:
  entry_minutes_before: 180
  exit_minutes_before: 15
  min_history_points: 5

paths:
  raw_markets: "data/raw/markets.json"
  raw_histories: "data/raw/histories.json"
  filtered_markets: "data/processed/scheduled_markets.json"
  dataset_csv: "data/processed/scheduled_dataset.csv"
  trades_csv: "data/processed/trades.csv"
  summary_json: "data/processed/backtest_summary.json"
