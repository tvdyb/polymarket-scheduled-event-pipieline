data:
  poly_data_dir: "./data/poly_data"
  whale_cache_dir: "./data/whales"

backtest:
  initial_cash: 10000
  slippage_cents: 0.01
  max_position_usd: 500
  tick_interval_seconds: 300
  equity_snapshot_interval: 3600

strategies:
  scheduled_momentum:
    hours_before_expiry: 24
    edge_threshold: 0.03
    max_position_usd: 500
    min_market_volume: 1000
    min_price: 0.70
    max_price: 0.97

  liquidity_reversion:
    impact_threshold: 0.03
    low_volume_threshold: 50000
    max_hold_seconds: 14400
    reversion_target_pct: 0.60
    max_position_usd: 300

  whale_follow:
    min_whale_size: 5000
    follow_delay_seconds: 900
    take_profit: 0.05
    stop_loss: 0.05
    max_market_volume: 200000
    max_position_usd: 300

  cross_market_arb:
    min_inversion_cents: 0.02
    min_event_markets: 3
    max_hold_seconds: 86400
    max_position_usd: 300

  resolution_catalyst:
    entry_hours_before: 48
    exit_hours_before: 2
    half_spread: 0.03
    max_inventory: 1000
    max_position_usd: 300
